<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e9f7ef"/>
      <stop offset="100%" stop-color="#b7e4c7"/>
    </linearGradient>
    <linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#95d5b2" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#d8f3dc" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="gateGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#52b788"/>
      <stop offset="100%" stop-color="#74c69d"/>
    </linearGradient>
  </defs>

  <!-- Background sky -->
  <rect x="0" y="0" width="100" height="74" fill="url(#skyGrad)" rx="4"/>

  <!-- Water reflection in field -->
  <rect x="0" y="54" width="100" height="20" fill="url(#waterGrad)" rx="0"/>

  <!-- Rice field rows (horizontal lines) -->
  <g stroke="#74c69d" stroke-width="1" opacity="0.6">
    <line x1="4" y1="56" x2="96" y2="56"/>
    <line x1="4" y1="62" x2="96" y2="62"/>
    <line x1="4" y1="68" x2="96" y2="68"/>
  </g>

  <!-- Gate pillars (light green) -->
  <rect x="30" y="14" width="7" height="50" fill="url(#gateGrad)" rx="2"/>
  <rect x="63" y="14" width="7" height="50" fill="url(#gateGrad)" rx="2"/>

  <!-- Gate top horizontal bar (top) -->
  <rect x="22" y="10" width="56" height="6" fill="#52b788" rx="3"/>
  <!-- Gate second horizontal bar -->
  <rect x="26" y="22" width="48" height="4" fill="#74c69d" rx="2"/>

  <!-- Gate top ornament center -->
  <rect x="47" y="4" width="6" height="10" fill="#40916c" rx="2"/>
  <circle cx="50" cy="4" r="4" fill="#95d5b2"/>

  <!-- Path through gate -->
  <polygon points="42,64 58,64 62,74 38,74" fill="#b7e4c7" opacity="0.5"/>

  <!-- Gate reflection in water -->
  <g opacity="0.18">
    <rect x="30" y="64" width="7" height="10" fill="#52b788"/>
    <rect x="63" y="64" width="7" height="10" fill="#52b788"/>
  </g>

  <!-- Rice stalks with golden ears -->
  <!-- Left sprouts -->
  <g stroke="#74c69d" stroke-width="1.4" stroke-linecap="round" fill="none">
    <line x1="10" y1="54" x2="10" y2="44"/>
    <line x1="18" y1="54" x2="18" y2="43"/>
    <line x1="78" y1="54" x2="78" y2="44"/>
    <line x1="86" y1="54" x2="86" y2="43"/>
  </g>
  <!-- Golden rice ears (ellipses as grain clusters) -->
  <g fill="#f4c430">
    <!-- Left side ears -->
    <ellipse cx="10" cy="42" rx="2.5" ry="5" transform="rotate(-10 10 42)"/>
    <ellipse cx="18" cy="41" rx="2.5" ry="5" transform="rotate(8 18 41)"/>
    <!-- Right side ears -->
    <ellipse cx="78" cy="42" rx="2.5" ry="5" transform="rotate(-10 78 42)"/>
    <ellipse cx="86" cy="41" rx="2.5" ry="5" transform="rotate(8 86 41)"/>
  </g>
  <!-- Small grain dots on ears -->
  <g fill="#e6a817">
    <circle cx="9"  cy="39" r="1.2"/>
    <circle cx="11" cy="38" r="1"/>
    <circle cx="10" cy="37" r="1.2"/>
    <circle cx="17" cy="38" r="1.2"/>
    <circle cx="19" cy="37" r="1"/>
    <circle cx="18" cy="36" r="1.2"/>
    <circle cx="77" cy="39" r="1.2"/>
    <circle cx="79" cy="38" r="1"/>
    <circle cx="78" cy="37" r="1.2"/>
    <circle cx="85" cy="38" r="1.2"/>
    <circle cx="87" cy="37" r="1"/>
    <circle cx="86" cy="36" r="1.2"/>
  </g>

  <!-- Separator line -->
  <line x1="108" y1="18" x2="108" y2="84" stroke="#95d5b2" stroke-width="1.5"/>

  <!-- Company name -->
  <text x="118" y="40" font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif"
        font-size="21" font-weight="800" fill="#40916c" letter-spacing="1">
    Tokamachi
  </text>
  <text x="118" y="65" font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif"
        font-size="28" font-weight="900" fill="#52b788" letter-spacing="3">
    GATE
  </text>

  <!-- Tagline -->
  <text x="119" y="82" font-family="'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif"
        font-size="9" fill="#74c69d" letter-spacing="2">
    十日町市 二地域居住推進
  </text>
</svg>
